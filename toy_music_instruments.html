<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Toy Piano (Do-Re-Mi)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .controls {
      margin-top: 15px;
    }

    select {
      padding: 8px 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .piano {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .key {
      width: 60px;
      height: 200px;
      margin: 5px;
      background: white;
      color: black;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
      user-select: none;
    }

    .key:active {
      background: #60a5fa;
      transform: scale(0.95);
    }
  </style>
</head>
<body>

<h1>🎹 Toy Piano (Do-Re-Mi)</h1>
<p>Use mouse or keys: A S D F G H J K or 1 2 3 4 5 6 7 8</p>

<div class="controls">
  <label for="instrument">Instrument: </label>
  <select id="instrument">
    <option value="piano">Piano</option>
    <option value="organ">Organ</option>
    <option value="flute">Flute</option>
    <option value="bell">Bell</option>
    <option value="pluck">Pluck</option>
    <option value="sine">Pure Sine</option>
    <option value="square">Square</option>
    <option value="triangle">Triangle</option>
    <option value="sawtooth">Sawtooth</option>
  </select>
</div>

<div class="piano">
  <div class="key" data-note="261.6">1<br>Do</div>
  <div class="key" data-note="293.7">2<br>Re</div>
  <div class="key" data-note="329.6">3<br>Mi</div>
  <div class="key" data-note="349.2">4<br>Fa</div>
  <div class="key" data-note="392.0">5<br>So</div>
  <div class="key" data-note="440.0">6<br>La</div>
  <div class="key" data-note="493.9">7<br>Si</div>
  <div class="key" data-note="523.3">8<br>Do</div>
</div>

<script>
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioContext();

  const instrumentSelect = document.getElementById("instrument");

  function playSound(freq) {
    const instrument = instrumentSelect.value;

    // Some instruments use multiple oscillators for richer sound
    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    const now = ctx.currentTime;

    if (instrument === "piano") {
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();

      osc1.type = "triangle";
      osc2.type = "sine";

      osc1.frequency.value = freq;
      osc2.frequency.value = freq * 2;

      osc1.connect(gain);
      osc2.connect(gain);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.35, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.7);
      osc2.stop(now + 0.7);

    } else if (instrument === "organ") {
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();

      osc1.type = "square";
      osc2.type = "triangle";

      osc1.frequency.value = freq;
      osc2.frequency.value = freq * 2;

      osc1.connect(gain);
      osc2.connect(gain);

      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 1.0);
      osc2.stop(now + 1.0);

    } else if (instrument === "flute") {
      const osc = ctx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = freq;

      osc.connect(gain);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.2, now + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

      osc.start(now);
      osc.stop(now + 0.8);

    } else if (instrument === "bell") {
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const osc3 = ctx.createOscillator();

      osc1.type = "sine";
      osc2.type = "sine";
      osc3.type = "sine";

      osc1.frequency.value = freq;
      osc2.frequency.value = freq * 2.7;
      osc3.frequency.value = freq * 4.1;

      osc1.connect(gain);
      osc2.connect(gain);
      osc3.connect(gain);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.3, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

      osc1.start(now);
      osc2.start(now);
      osc3.start(now);
      osc1.stop(now + 1.2);
      osc2.stop(now + 1.2);
      osc3.stop(now + 1.2);

    } else if (instrument === "pluck") {
      const osc = ctx.createOscillator();
      osc.type = "triangle";
      osc.frequency.value = freq;

      osc.connect(gain);

      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

      osc.start(now);
      osc.stop(now + 0.35);

    } else {
      const osc = ctx.createOscillator();
      osc.type = instrument; // sine, square, triangle, sawtooth
      osc.frequency.value = freq;

      osc.connect(gain);

      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

      osc.start(now);
      osc.stop(now + 0.5);
    }
  }

  // Click support
  document.querySelectorAll(".key").forEach(key => {
    key.addEventListener("click", async () => {
      if (ctx.state === "suspended") await ctx.resume();
      playSound(Number(key.dataset.note));
    });
  });

  // Keyboard support
  const keyMap = {
    a: 261.6, s: 293.7, d: 329.6, f: 349.2,
    g: 392.0, h: 440.0, j: 493.9, k: 523.3,

    "1": 261.6,
    "2": 293.7,
    "3": 329.6,
    "4": 349.2,
    "5": 392.0,
    "6": 440.0,
    "7": 493.9,
    "8": 523.3
  };

  document.addEventListener("keydown", async (e) => {
    const freq = keyMap[e.key.toLowerCase()];
    if (freq) {
      if (ctx.state === "suspended") await ctx.resume();
      playSound(freq);
    }
  });
</script>

</body>
</html>
