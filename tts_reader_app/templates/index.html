<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI TTS Reader</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>OpenAI TTS Reader</h1>
    <p class="subtitle">Paste text or upload <code>.txt</code>, <code>.pdf</code>, <code>.doc</code>, <code>.docx</code> and convert it to speech.</p>

    <form id="tts-form">
      <label for="text">Text input</label>
      <textarea id="text" name="text" rows="8" placeholder="Paste text here..."></textarea>

      <label for="file">Or upload a document</label>
      <input id="file" name="file" type="file" accept=".txt,.pdf,.doc,.docx" />

      <div class="grid">
        <div>
          <label for="model">Model</label>
          <select id="model" name="model">
            <option value="gpt-4o-mini-tts" selected>gpt-4o-mini-tts</option>
            <option value="tts-1">tts-1</option>
            <option value="tts-1-hd">tts-1-hd</option>
          </select>
        </div>

        <div>
          <label for="voice">Voice</label>
          <select id="voice" name="voice">
            <option>alloy</option>
            <option>ash</option>
            <option>ballad</option>
            <option>coral</option>
            <option>echo</option>
            <option>fable</option>
            <option>nova</option>
            <option>onyx</option>
            <option>sage</option>
            <option>shimmer</option>
          </select>
        </div>

        <div>
          <label for="speed">Speed: <span id="speed-val">1.0</span>x</label>
          <input id="speed" name="speed" type="range" min="0.25" max="4" step="0.05" value="1.0" />
        </div>

        <div>
          <label for="response_format">Audio format</label>
          <select id="response_format" name="response_format">
            <option value="mp3" selected>mp3</option>
            <option value="wav">wav</option>
            <option value="opus">opus</option>
            <option value="aac">aac</option>
            <option value="flac">flac</option>
          </select>
        </div>
      </div>

      <label for="instructions">Voice style / nature instructions</label>
      <textarea id="instructions" name="instructions" rows="3" placeholder="Example: Warm, engaging, and conversational tone."></textarea>

      <button type="submit" id="submit-btn">Generate speech</button>
    </form>

    <section id="result" class="hidden">
      <h2>Playback</h2>
      <audio id="player" controls></audio>
      <a id="download" download="speech.mp3">Download audio</a>
    </section>

    <p id="status"></p>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
